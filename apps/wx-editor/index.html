<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="keywords" content="md,markdown,markdown-editor,wechat,official-account" />
    <meta name="description" content="Wechat Markdown Editor | 一款高度简洁的微信 Markdown 编辑器" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>微信 Markdown 编辑器</title>
    <style>
      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        background: #f5f6f8;
      }

      #app-boot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f6f8;
        transition: opacity 0.22s ease;
      }

      #app-boot.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      #app-boot .boot-card {
        width: min(560px, calc(100vw - 48px));
        padding: 18px;
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 10px;
        background: #ffffff;
      }

      #app-boot .boot-line {
        height: 10px;
        margin-top: 10px;
        border-radius: 999px;
        background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
        background-size: 200% 100%;
        animation: app-boot-shimmer 1.1s linear infinite;
      }

      #app-boot .boot-line:first-child {
        margin-top: 0;
        width: 45%;
      }

      #app-boot .boot-line:nth-child(2) {
        width: 80%;
      }

      #app-boot .boot-line:nth-child(3) {
        width: 66%;
      }

      #app-boot .boot-line:nth-child(4) {
        width: 58%;
      }

      #app-boot .boot-label {
        margin-top: 12px;
        font-size: 12px;
        color: #64748b;
        letter-spacing: 0.2px;
      }

      @keyframes app-boot-shimmer {
        from {
          background-position: 200% 0;
        }
        to {
          background-position: -200% 0;
        }
      }
    </style>
  </head>

  <body>
    <div id="app-boot" role="status" aria-live="polite" aria-label="Application loading">
      <div class="boot-card">
        <div class="boot-line"></div>
        <div class="boot-line"></div>
        <div class="boot-line"></div>
        <div class="boot-line"></div>
        <div class="boot-label">Loading editor...</div>
      </div>
    </div>
    <noscript>
      <strong>Please enable JavaScript to continue.</strong>
    </noscript>
    <div id="app"></div>
    <script>
      window.MathJax = {
        loader: { load: ['[tex]/ams'] },
        tex: { packages: { '[+]': ['ams'] }, tags: 'ams' },
        svg: { fontCache: 'none' },
      }
    </script>
    <script id="MathJax-script" src="%BASE_URL%mathjax/es5/tex-svg.js"></script>
    <script type="module" src="/src/main.ts"></script>
    <script src="%BASE_URL%lib/main.js"></script>
  </body>
</html>
